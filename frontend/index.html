<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Extract token from URL and persist BEFORE any resources load -->
    <script>
      (function() {
        var p = new URLSearchParams(location.search);
        var t = p.get('token');
        if (t) {
          localStorage.setItem('devtoolbox_token', t);
          document.cookie = 'devtoolbox_token=' + t + ';max-age=31536000;path=/;SameSite=Lax';
          // Clean URL to avoid leaking token in address bar
          var clean = new URL(location.href);
          clean.searchParams.delete('token');
          history.replaceState(null, '', clean.pathname);
        }
      })();
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <title>DevToolBox - 开发工具箱</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
