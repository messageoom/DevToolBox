name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-check:
    name: Backend Lint & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check all Python files
        run: |
          python -m py_compile backend/app.py
          for f in backend/modules/*.py backend/utils/*.py; do
            python -m py_compile "$f"
          done

      - name: Import check
        run: |
          cd backend
          python -c "from app import create_app; app = create_app(); print('Flask app created successfully')"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  build-release:
    name: Build Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [backend-check, frontend-build]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build -- --outDir ../backend/static/frontend

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: python build.py

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevToolBox-windows
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DevToolBox*.exe
          generate_release_notes: true
