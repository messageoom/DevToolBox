name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-check:
    name: Backend Lint & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check all Python files
        run: |
          python -m py_compile backend/app.py
          for f in backend/modules/*.py backend/utils/*.py; do
            python -m py_compile "$f"
          done

      - name: Import check
        run: |
          PYTHONPATH=. python -c "from backend.app import create_app; app = create_app(); print('Flask app created successfully')"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest -v

  build-binary:
    name: Build (${{ matrix.config.label }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [backend-check, backend-test, frontend-build]
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: windows-latest
            label: Windows
            artifact: DevToolBox-windows
            ext: .exe
          - os: macos-latest
            label: macOS
            artifact: DevToolBox-macos
            ext: ''
          - os: ubuntu-latest
            label: Linux
            artifact: DevToolBox-linux
            ext: ''
    runs-on: ${{ matrix.config.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          # refs/tags/v2.1.0 → 2.1.0
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango1.0-dev libharfbuzz-dev libffi-dev \
            libjpeg-dev zlib1g-dev libgirepository1.0-dev \
            gir1.2-webkit2-4.1

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # pywebview uses system WebKit — no extra brew needed on macOS 14+
          xcode-select -p || xcode-select --install 2>/dev/null || true

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build -- --outDir ../backend/static/frontend

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: python build.py --version ${{ steps.version.outputs.version }}
        env:
          PYTHONUTF8: 1

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DIST_DIR="dist/GUI_${VERSION}"
          if [ ! -d "$DIST_DIR" ]; then
            echo "::error::Output directory $DIST_DIR not found"
            ls -R dist/ || true
            exit 1
          fi
          cd "$DIST_DIR"
          if [ "${{ matrix.config.ext }}" = ".exe" ]; then
            EXE_FILE=$(ls DevToolBox-*.exe 2>/dev/null | head -1)
          else
            EXE_FILE=$(ls DevToolBox-* 2>/dev/null | grep -v '\.sh$' | grep -v '\.md$' | head -1)
          fi
          if [ -z "$EXE_FILE" ]; then
            echo "::error::No executable found in $DIST_DIR"
            ls -la
            exit 1
          fi
          if [ "${{ runner.os }}" = "Windows" ]; then
            certutil -hashfile "$EXE_FILE" SHA256 | grep -v ":" | tr -d ' \r\n' > "${EXE_FILE}.sha256"
          else
            shasum -a 256 "$EXE_FILE" > "${EXE_FILE}.sha256"
          fi
          echo "Checksum generated:"
          cat "${EXE_FILE}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact }}
          path: dist/GUI_${{ steps.version.outputs.version }}/

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: DevToolBox-*
          merge-multiple: true

      - name: Verify all platform binaries present
        shell: bash
        run: |
          set -e
          missing=0
          for pat in \
            'artifacts/DevToolBox-*-windows-x64.exe' \
            'artifacts/DevToolBox-*-windows-x64.exe.sha256' \
            'artifacts/DevToolBox-*-macos-arm64' \
            'artifacts/DevToolBox-*-macos-arm64.sha256' \
            'artifacts/DevToolBox-*-linux-x64' \
            'artifacts/DevToolBox-*-linux-x64.sha256'; do
            if ! ls $pat 1>/dev/null 2>&1; then
              echo "ERROR: missing $pat"; missing=1
            fi
          done
          [ "$missing" = "0" ] || exit 1
          echo "All platform binaries present:"; ls -la artifacts/

      - name: Extract latest changelog
        id: changelog
        shell: bash
        env:
          GITHUB_STEP_SUMMARY: ''
        run: |
          python3 << 'PYEOF'
          import re, os, tempfile
          with open('CHANGELOG.md', encoding='utf-8') as f:
              content = f.read()
          pattern = r'(## \[[^\]]+\][^\n]*\n(?:(?!\n## \[).)*)'
          match = re.search(pattern, content, re.DOTALL)
          body = match.group(1).strip() if match else 'See CHANGELOG.md for details.'
          out = os.path.join(tempfile.gettempdir(), 'release_body.md')
          with open(out, 'w', encoding='utf-8') as f:
              f.write(body)
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"body_file={out}\n")
          PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/DevToolBox-*-windows-x64.exe
            artifacts/DevToolBox-*-windows-x64.exe.sha256
            artifacts/DevToolBox-*-macos-arm64
            artifacts/DevToolBox-*-macos-arm64.sha256
            artifacts/DevToolBox-*-linux-x64
            artifacts/DevToolBox-*-linux-x64.sha256
          body_path: ${{ steps.changelog.outputs.body_file }}
          draft: false
          prerelease: false
          overwrite_files: true
