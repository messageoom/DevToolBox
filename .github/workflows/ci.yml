name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-check:
    name: Backend Lint & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check all Python files
        run: |
          python -m py_compile backend/app.py
          for f in backend/modules/*.py backend/utils/*.py; do
            python -m py_compile "$f"
          done

      - name: Import check
        run: |
          PYTHONPATH=. python -c "from backend.app import create_app; app = create_app(); print('Flask app created successfully')"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  build-release:
    name: Build (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [backend-check, frontend-build]
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: DevToolBox-windows
            pattern: dist/CLI/DevToolBox*.exe
          - os: macos-latest
            artifact: DevToolBox-macos
            pattern: dist/CLI/DevToolBox*
          - os: ubuntu-latest
            artifact: DevToolBox-linux
            pattern: dist/CLI/DevToolBox*
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango1.0-dev libharfbuzz-dev libffi-dev libjpeg-dev zlib1g-dev

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build -- --outDir ../backend/static/frontend

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: python build.py
        env:
          PYTHONUTF8: 1

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/CLI/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.pattern }}
          body_path: CHANGELOG.md
